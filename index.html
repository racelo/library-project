<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Project: Library</title>
    </head>

    <body>
        <!-- <h1>My Books</h1> -->
        <table>
            <caption>Read Books</caption>
            <thead>
                <tr>
                    <th scope="col">Title</th>
                    <th scope="col">Author</th>
                    <th scope="col">Rating</th>
                    <th scope="col">Read Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button command="show-modal" commandfor="dialog" id="createBook">New Book</button>
        <dialog id="dialog">
            <form action="" id="myForm" method="dialog">
                <div>
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div>
                    <label for="author">Author:</label>
                    <input type="text" id="author" name="author" required>

                </div>
                <div>
                    <label for="pages">Pages:</label>
                    <input type="text" id="pages" name="pages" required>
                </div>
                <div>
                    <label for="readStatus">Read Status:</label>
                    <input type="text" id="readStatus" name="readStatus" required>
                </div>
                <button type="submit" id="submit">Submit</button>
            </form>
        </dialog>


        <script src="script.js"></script>
    </body>

</html>
